---
- name: "Neovim | RedHat-family | Enable EPEL"
  ansible.builtin.dnf:
    name: epel-release
    state: present
  become: true
  when: ansible_distribution != "Fedora"

- name: "Neovim | RedHat-family | Dependencies"
  ansible.builtin.dnf:
    name:
      - cmake
      - curl
      - pkg-config
      - libtool
      - unzip
      - ripgrep
      - gcc
      - gcc-c++
      - make
    state: present
  become: true

# Fedora ships recent neovim in its repos
- name: "Neovim | Fedora | Install Neovim"
  ansible.builtin.dnf:
    name: neovim
    state: latest
  become: true
  when: ansible_distribution == "Fedora"

# AlmaLinux/RHEL/Rocky repos ship old neovim — install from upstream binary tarball
- name: "Neovim | RedHat non-Fedora | Download Neovim tarball"
  ansible.builtin.get_url:
    url: "https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz"
    dest: "/tmp/nvim-linux-x86_64.tar.gz"
    mode: "0644"
  when: ansible_distribution != "Fedora"

- name: "Neovim | RedHat non-Fedora | Extract Neovim"
  ansible.builtin.unarchive:
    src: "/tmp/nvim-linux-x86_64.tar.gz"
    dest: "/opt"
    remote_src: true
  become: true
  when: ansible_distribution != "Fedora"

- name: "Neovim | RedHat non-Fedora | Set permissions on nvim directory"
  ansible.builtin.file:
    path: "/opt/nvim-linux-x86_64"
    state: directory
    mode: "0755"
    recurse: true
  become: true
  when: ansible_distribution != "Fedora"

- name: "Neovim | RedHat non-Fedora | Symlink nvim binary"
  ansible.builtin.file:
    src: "/opt/nvim-linux-x86_64/bin/nvim"
    dest: "/usr/local/bin/nvim"
    state: link
    force: true
  become: true
  when: ansible_distribution != "Fedora"
